name: Update map data

on:
  workflow_dispatch:
    inputs:
      regeocode:
        description: "Ré-géocoder tout (vide le cache Nominatim)"
        type: boolean
        default: false
      refresh:
        description: "Re-télécharger les articles (vide le cache WP)"
        type: boolean
        default: false
      min_mentions:
        description: "Min. mentions par lieu (défaut: 2)"
        type: string
        default: "2"
      generate_summaries:
        description: "Générer / régénérer les résumés thématiques (Claude API, ~0.20 USD)"
        type: choice
        options:
          - "non"
          - "manquants_seulement"
          - "tous"
        default: "non"
      summaries_lang:
        description: "Langue des résumés (si génération activée)"
        type: choice
        options:
          - "fr"
          - "en"
          - "fr+en"
        default: "fr"
      generate_entity_summaries:
        description: "Générer / régénérer les résumés contextuels d'entités (Claude API, ~0.50-1.50 USD selon le scope)"
        type: choice
        options:
          - "non"
          - "manquants_seulement"
          - "tous"
        default: "non"
      entity_summaries_min:
        description: "Min. mentions pour générer un résumé d'entité (défaut: 2)"
        type: string
        default: "2"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (avec history)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download spaCy models
        run: |
          python -m spacy download fr_core_news_lg
          python -m spacy download en_core_web_lg
          python -m spacy download ru_core_news_lg
          python -m spacy download xx_ent_wiki_sm

      - name: Run pipeline
        run: |
          set -x
          ARGS="--min-mentions ${{ github.event.inputs.min_mentions || '2' }}"
          if [ "${{ github.event.inputs.regeocode }}" = "true" ]; then
            ARGS="$ARGS --regeocode"
          fi
          if [ "${{ github.event.inputs.refresh }}" = "true" ]; then
            ARGS="$ARGS --refresh"
          fi
          python -u pipeline.py $ARGS

      - name: Generate place summaries (Claude API)
        # Sur schedule (run auto hebdomadaire) : par défaut --only-missing.
        # Sur dispatch manuel : selon le choix de l'utilisateur.
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.generate_summaries == 'manquants_seulement' ||
          github.event.inputs.generate_summaries == 'tous'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠ Secret ANTHROPIC_API_KEY non défini dans Settings → Secrets → Actions."
            echo "  Va sur Settings du repo, ajoute ce secret avec ta clé Claude API."
            exit 1
          fi

          # Sur schedule : --only-missing par défaut. Sur dispatch : selon input.
          MODE_ARGS="--only-missing"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.generate_summaries }}" = "tous" ]; then
            MODE_ARGS=""
          fi

          # Sur schedule : langue FR par défaut. Sur dispatch : selon input (avec fallback fr).
          LANGS="${{ github.event.inputs.summaries_lang }}"
          if [ -z "$LANGS" ]; then
            LANGS="fr"
          fi
          for LANG in $(echo "$LANGS" | tr '+' ' '); do
            echo "=== Génération des résumés de lieux en $LANG (mode: ${MODE_ARGS:-tous}) ==="
            python -u generate_summaries.py --lang "$LANG" $MODE_ARGS
          done

      - name: Generate entity summaries (Claude API)
        # Sur schedule : par défaut --only-missing. Sur dispatch : selon input.
        if: |
          github.event_name == 'schedule' ||
          github.event.inputs.generate_entity_summaries == 'manquants_seulement' ||
          github.event.inputs.generate_entity_summaries == 'tous'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠ Secret ANTHROPIC_API_KEY non défini dans Settings → Secrets → Actions."
            exit 1
          fi

          # Min-mentions : input ou défaut 2
          MIN_MENTIONS="${{ github.event.inputs.entity_summaries_min }}"
          if [ -z "$MIN_MENTIONS" ]; then
            MIN_MENTIONS="2"
          fi
          MODE_ARGS="--min-mentions $MIN_MENTIONS --only-missing"

          # Sur dispatch + 'tous' : retire --only-missing pour tout regénérer
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.generate_entity_summaries }}" = "tous" ]; then
            MODE_ARGS="--min-mentions $MIN_MENTIONS"
          fi

          LANGS="${{ github.event.inputs.summaries_lang }}"
          if [ -z "$LANGS" ]; then
            LANGS="fr"
          fi
          for LANG in $(echo "$LANGS" | tr '+' ' '); do
            echo "=== Génération des résumés d'entités en $LANG (mode: ${MODE_ARGS}) ==="
            python -u generate_entity_summaries.py --lang "$LANG" $MODE_ARGS
          done

      - name: Inspect outputs
        if: always()
        run: |
          echo "=== Working dir ==="
          ls -la
          echo "=== data.json _meta ==="
          [ -f data.json ] && python -c "import json; print(json.dumps(json.load(open('data.json'))['_meta'], indent=2))" || echo "data.json absent"
          echo "=== entities.json _meta ==="
          [ -f entities.json ] && python -c "import json; print(json.dumps(json.load(open('entities.json'))['_meta'], indent=2))" || echo "entities.json absent"
          echo "=== place_summaries.json _meta ==="
          [ -f place_summaries.json ] && python -c "import json; print(json.dumps(json.load(open('place_summaries.json'))['_meta'], indent=2))" || echo "place_summaries.json absent"
          echo "=== entity_summaries.json _meta ==="
          [ -f entity_summaries.json ] && python -c "import json; print(json.dumps(json.load(open('entity_summaries.json'))['_meta'], indent=2))" || echo "entity_summaries.json absent"
          echo "=== cache/ ==="
          [ -d cache ] && ls -la cache/ || echo "cache/ absent"

      - name: Commit & push si des changements
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          [ -f data.json ] && git add data.json
          [ -f entities.json ] && git add entities.json
          [ -f entities_curation.json ] && git add entities_curation.json
          [ -f place_summaries.json ] && git add place_summaries.json
          [ -f entity_summaries.json ] && git add entity_summaries.json
          [ -d cache ] && git ls-files --others --exclude-standard cache/ | xargs -r git add
          [ -d cache ] && git add -u cache/
          [ -f place_aliases.json ] && git add place_aliases.json

          if git diff --staged --quiet; then
            echo "Pas de changement, rien à commiter."
          else
            git commit -m "🌍 Mise à jour data ($(date -u +%Y-%m-%d))"
            git push
          fi
