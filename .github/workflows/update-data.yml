name: Update map data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (avec history)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download spaCy models
        run: |
          python -m spacy download fr_core_news_lg
          python -m spacy download en_core_web_lg
          python -m spacy download ru_core_news_lg
          python -m spacy download xx_ent_wiki_sm

      - name: Run pipeline
        run: |
          set -x
          python -u pipeline.py
        continue-on-error: false

      - name: Inspect outputs
        if: always()
        run: |
          echo "=== Working dir contents ==="
          ls -la
          echo "=== data.json size ==="
          [ -f data.json ] && wc -c data.json || echo "data.json absent"
          echo "=== cache/ contents ==="
          [ -d cache ] && ls -la cache/ || echo "cache/ absent"
          echo "=== data.json _meta ==="
          [ -f data.json ] && python -c "import json; print(json.dumps(json.load(open('data.json'))['_meta'], indent=2))" || true

      - name: Commit & push si des changements
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ajoute seulement ce qui existe vraiment
          [ -f data.json ] && git add data.json
          [ -d cache ] && git ls-files --others --exclude-standard cache/ | xargs -r git add
          [ -d cache ] && git add -u cache/
          [ -f place_aliases.json ] && git add place_aliases.json

          if git diff --staged --quiet; then
            echo "Pas de changement, rien à commiter."
          else
            git commit -m "🌍 Mise à jour data.json ($(date -u +%Y-%m-%d))"
            git push
          fi
